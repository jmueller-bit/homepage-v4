<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 160">
  <!-- ALZ Logo - Connected letters A, L, Z -->
  <defs>
    <style>
      .logo-stroke {
        fill: none;
        stroke-width: 22;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Orange L - Left vertical and top horizontal -->
  <path d="M 35 140 L 35 50 Q 35 35 50 35 L 95 35" 
        stroke="#E8A838" class="logo-stroke"/>
  
  <!-- Red Z - Diagonal from top-right to bottom-left -->
  <path d="M 145 35 L 95 95" 
        stroke="#B5423C" class="logo-stroke"/>
  
  <!-- Red Z - Bottom horizontal -->
  <path d="M 95 95 L 145 95 Q 145 95 145 110 L 145 140" 
        stroke="#B5423C" class="logo-stroke"/>
  
  <!-- Green A - Right vertical -->
  <path d="M 115 35 Q 145 35 145 65 L 145 140" 
        stroke="#5A8F5A" class="logo-stroke"/>
</svg>