<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180">
  <!-- ALZ Logo - Connected letters -->
  <defs>
    <style>
      .logo-path { fill: none; stroke-width: 22; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Green A (left vertical with top curve) -->
  <path d="M 30 160 L 30 70 Q 30 30 70 30 L 85 30" 
        stroke="#4A7C59" class="logo-path"/>
  
  <!-- Orange L (top horizontal connecting to diagonal) -->
  <path d="M 70 30 L 110 30 Q 130 30 130 50 L 130 95" 
        stroke="#F5A623" class="logo-path"/>
  
  <!-- Red Z diagonal (from top-right to middle) -->
  <path d="M 170 30 L 110 95" 
        stroke="#C44536" class="logo-path"/>
  
  <!-- Red Z bottom (horizontal extension) -->
  <path d="M 130 95 L 170 95 Q 170 95 170 115 L 170 160" 
        stroke="#C44536" class="logo-path"/>
</svg>