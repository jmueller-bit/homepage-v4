<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140">
  <defs>
    <style>
      .logo-path {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Orange L -->
  <path class="logo-path" stroke="#E8A838" stroke-width="18" 
        d="M 28 125 L 28 50 Q 28 32 46 32 L 90 32"/>
  
  <!-- Red Z diagonal -->
  <path class="logo-path" stroke="#C44536" stroke-width="18"
        d="M 90 32 L 132 90"/>
  
  <!-- Red Z bottom -->
  <path class="logo-path" stroke="#C44536" stroke-width="18"
        d="M 90 90 L 132 90 Q 132 90 132 108 L 132 125"/>
  
  <!-- Green A right side -->
  <path class="logo-path" stroke="#5A8F5A" stroke-width="18"
        d="M 105 32 Q 132 32 132 59 L 132 125"/>
</svg>